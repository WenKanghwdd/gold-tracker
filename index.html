<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金价追踪器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --c-red: #E24B4A;
      --c-green: #1D9E75;
      --c-gold: #DAA520;
      --c-gold-dark: #B8860B;
      --bg: #F5F5F0;
      --card: #FFFFFF;
      --border: #E0DDD5;
      --text: #1A1A18;
      --text2: #666660;
      --text3: #999990;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px 12px 40px; max-width: 480px; margin: 0 auto; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; color: var(--c-gold-dark); }
    .header .last-updated { font-size: 11px; color: var(--text3); }

    .market-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab-btn { flex: 1; padding: 8px 0; border: 0.5px solid var(--border); border-radius: 8px; background: var(--card); font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--c-gold); color: #fff; border-color: var(--c-gold); font-weight: 500; }

    .price-hero { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px 16px; margin-bottom: 10px; }
    .price-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .price-label .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c-green); animation: pulse 2s infinite; }
    .price-label .dot.error { background: var(--c-red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .price-main { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 6px; }
    .price-unit { font-size: 14px; font-weight: 400; color: var(--text2); margin-left: 4px; }
    .price-change { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 500; }
    .price-change.up { background: #FDECEA; color: var(--c-red); }
    .price-change.down { background: #E8F5EF; color: var(--c-green); }
    .price-change.flat { background: #F0F0EC; color: var(--text2); }
    .market-name { font-size: 11px; color: var(--text3); margin-top: 6px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .stat-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 8px; text-align: center; }
    .stat-period { font-size: 10px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-val { font-size: 15px; font-weight: 600; }
    .stat-val.up { color: var(--c-red); }
    .stat-val.down { color: var(--c-green); }
    .stat-val.neutral { color: var(--text2); }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text2); margin: 16px 0 8px; display: flex; align-items: center; justify-content: space-between; }
    .section-title .range-selector { display: flex; gap: 4px; }
    .range-btn { padding: 3px 8px; border: 0.5px solid var(--border); border-radius: 6px; background: var(--card); font-size: 11px; color: var(--text2); cursor: pointer; }
    .range-btn.active { background: var(--c-gold); color: #fff; border-color: var(--c-gold); }

    .chart-wrap { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; position: relative; }
    .chart-wrap canvas { width: 100% !important; }

    .alert-section { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .alert-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .alert-input { flex: 1; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: var(--bg); }
    .alert-input:focus { border-color: var(--c-gold); }
    .alert-type-select { padding: 8px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); outline: none; }
    .add-btn { padding: 8px 14px; background: var(--c-gold); color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .add-btn:hover { background: var(--c-gold-dark); }
    .add-btn:disabled { background: #ccc; cursor: not-allowed; }
    .alert-list { display: flex; flex-direction: column; gap: 6px; }
    .alert-item { display: flex; align-items: center; justify-content: space-between; background: #FFFBF0; border: 0.5px solid #E8D5A0; border-radius: 8px; padding: 8px 12px; font-size: 13px; }
    .alert-item .alert-info { display: flex; align-items: center; gap: 8px; }
    .alert-item .alert-price { font-weight: 600; color: var(--c-gold-dark); }
    .alert-item .alert-label { font-size: 11px; color: var(--text3); }
    .del-btn { color: var(--text3); cursor: pointer; background: none; border: none; font-size: 16px; padding: 0 4px; }
    .del-btn:hover { color: var(--c-red); }

    .info-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .info-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; }
    .info-card .label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .info-card .value { font-size: 14px; font-weight: 600; }

    .footer { text-align: center; padding: 12px; font-size: 11px; color: var(--text3); }
    .footer a { color: var(--text3); text-decoration: none; }
    .footer a:hover { color: var(--c-gold-dark); }

    .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; border-radius: var(--radius); font-size: 13px; color: var(--text2); }
    .loading-overlay.hidden { display: none; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--c-gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-data { text-align: center; padding: 24px; color: var(--text3); font-size: 13px; }

    .email-hint { font-size: 11px; color: var(--text3); line-height: 1.5; margin-bottom: 8px; }
    .email-hint a { color: var(--c-gold); text-decoration: none; }
    .email-hint a:hover { text-decoration: underline; }
    .email-status { font-size: 12px; margin-top: 8px; text-align: center; padding: 6px; border-radius: 6px; }
    .email-status.success { background: #E8F5EF; color: var(--c-green); }
    .email-status.error { background: #FDECEA; color: var(--c-red); }
    .email-status.sending { background: #FFF8E1; color: #F57C00; }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--c-gold-dark); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>

  <div class="header">
    <h1>金价追踪器</h1>
    <div style="text-align:right">
      <div class="last-updated" id="lastUpdated">加载中…</div>
    </div>
  </div>

  <!-- 切换按钮 -->
  <div class="market-tabs">
    <button class="tab-btn active" onclick="switchMarket('both')">综合</button>
    <button class="tab-btn" onclick="switchMarket('cn')">国内·沪金</button>
    <button class="tab-btn" onclick="switchMarket('us')">国际·XAU</button>
  </div>

  <!-- 价格卡片 -->
  <div id="priceCards"></div>

  <!-- 涨跌幅统计 -->
  <div class="stats-row" id="statsRow"></div>

  <!-- 历史走势图 -->
  <div class="section-title">
    历史走势
    <div class="range-selector">
      <button class="range-btn" onclick="changeRange('1W')">1W</button>
      <button class="range-btn" onclick="changeRange('1M')">1M</button>
      <button class="range-btn active" onclick="changeRange('1Y')">1Y</button>
      <button class="range-btn" onclick="changeRange('5Y')">5Y</button>
    </div>
  </div>
  <div class="chart-wrap">
    <div class="loading-overlay" id="chartLoader"><span class="spinner"></span>加载历史数据…</div>
    <canvas id="goldChart" role="img" aria-label="金价历史走势图"></canvas>
  </div>

  <!-- 价格提醒 -->
  <div class="section-title">价格提醒</div>
  <div class="alert-section">
    <div class="alert-row">
      <input class="alert-input" id="alertPrice" type="number" placeholder="输入提醒价格，如 650">
      <select class="alert-type-select" id="alertType">
        <option value="above">突破上限</option>
        <option value="below">跌破下限</option>
      </select>
      <button class="add-btn" onclick="addAlert()">+ 添加</button>
    </div>
    <div class="alert-list" id="alertList"></div>
  </div>

  <!-- 邮件通知设置 -->
  <div class="section-title">
    邮件通知
    <button class="add-btn" style="padding:4px 10px;font-size:11px" id="emailToggleBtn" onclick="toggleEmailSettings()">设置</button>
  </div>
  <div class="alert-section" id="emailSettings" style="display:none">
    <div class="email-hint">
      设置后，当价格触发提醒时会发送邮件通知。<br>
      API Key 仅存储在本地浏览器，不会上传到服务器。<br>
      <a href="https://resend.com/api-keys" target="_blank">去 Resend 获取 API Key →</a>
    </div>
    <div class="alert-row" style="flex-direction:column;gap:8px">
      <input class="alert-input" id="notifyEmail" type="email" placeholder="接收提醒的邮箱地址" style="width:100%">
      <input class="alert-input" id="resendKey" type="password" placeholder="Resend API Key" style="width:100%">
      <button class="add-btn" style="width:100%" onclick="saveEmailSettings()">保存设置</button>
    </div>
    <div id="emailStatus"></div>
  </div>

  <!-- 参考信息 -->
  <div class="section-title">参考信息</div>
  <div class="info-bar">
    <div class="info-card">
      <div class="label">今日开盘</div>
      <div class="value" id="openPrice">--</div>
    </div>
    <div class="info-card">
      <div class="label">今日最高 / 最低</div>
      <div class="value" id="highLow">--</div>
    </div>
    <div class="info-card">
      <div class="label">52周最高</div>
      <div class="value" id="week52High">--</div>
    </div>
    <div class="info-card">
      <div class="label">52周最低</div>
      <div class="value" id="week52Low">--</div>
    </div>
  </div>

  <div class="footer">
    数据来源：新浪财经 &nbsp;|&nbsp;
    <a href="https://finance.eastmoney.com/" target="_blank">东方财富</a> ·
    <a href="https://www.jin10.com/" target="_blank">金十数据</a>
    <br><br>
    市场价格仅供参考，请以实际交易价格为准
  </div>

<script>
// ============ 全局状态 ============
let currentMarket = 'both';
let currentRange = '1Y';
let chartInstance = null;
let cnPrice = null;
let usPrice = null;
let cnHistory = [];
let usHistory = [];
let alerts = JSON.parse(localStorage.getItem('goldAlerts') || '[]');
let emailSettings = JSON.parse(localStorage.getItem('goldEmailSettings') || '{}');
let triggeredAlerts = new Set(); // 防止重复触发

// ============ 初始化 ============
async function init() {
  loadEmailSettings();
  renderAlerts();
  await fetchCurrentPrices();
  await fetchHistory(currentRange);
  checkAlerts();
  setInterval(fetchCurrentPrices, 30000);
}

// ============ 邮件设置 ============
function loadEmailSettings() {
  const emailInput = document.getElementById('notifyEmail');
  const keyInput = document.getElementById('resendKey');
  if (emailSettings.email) emailInput.value = emailSettings.email;
  if (emailSettings.apiKey) keyInput.value = emailSettings.apiKey;
  updateEmailToggleBtn();
}

function saveEmailSettings() {
  const email = document.getElementById('notifyEmail').value.trim();
  const apiKey = document.getElementById('resendKey').value.trim();
  const statusEl = document.getElementById('emailStatus');

  if (!email || !apiKey) {
    statusEl.className = 'email-status error';
    statusEl.textContent = '请填写邮箱地址和 API Key';
    return;
  }

  if (!email.includes('@')) {
    statusEl.className = 'email-status error';
    statusEl.textContent = '请输入有效的邮箱地址';
    return;
  }

  emailSettings = { email, apiKey };
  localStorage.setItem('goldEmailSettings', JSON.stringify(emailSettings));

  statusEl.className = 'email-status success';
  statusEl.textContent = '设置已保存！触发提醒时会发送邮件';
  updateEmailToggleBtn();

  setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 3000);
}

function toggleEmailSettings() {
  const el = document.getElementById('emailSettings');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function updateEmailToggleBtn() {
  const btn = document.getElementById('emailToggleBtn');
  if (emailSettings.email) {
    btn.textContent = '已设置';
    btn.style.background = 'var(--c-green)';
  } else {
    btn.textContent = '设置';
    btn.style.background = '';
  }
}

// ============ 实时价格 ============
async function fetchCurrentPrices() {
  try {
    const [cnRes, usRes] = await Promise.all([
      fetchCNPrice(),
      fetchUSPrice()
    ]);

    cnPrice = cnRes.price;
    usPrice = usRes.price;

    document.getElementById('lastUpdated').textContent =
      '更新于 ' + new Date().toLocaleTimeString('zh-CN');

    renderPriceCards();
    renderStats();
    updateInfoCards();
    notifyAlerts();

  } catch(e) {
    console.warn('价格获取失败', e);
    document.getElementById('lastUpdated').textContent = '数据获取异常 ' + new Date().toLocaleTimeString('zh-CN');
    if (cnPrice) renderPriceCards();
  }
}

// 国内金价 - 新浪财经（沪金主力，元/克）
async function fetchCNPrice() {
  try {
    const url = 'https://hq.sinajs.cn/list=hf_GC';
    const resp = await fetch(url, { headers: { 'Referer': 'https://finance.sina.com.cn' } });
    const text = await resp.text();
    const match = text.match(/="([^"]+)"/);
    if (match) {
      const parts = match[1].split(',');
      const currentPrice = parseFloat(parts[2]) || 0;
      const yesterdayClose = parseFloat(parts[3]) || 0;
      const high = parseFloat(parts[4]) || 0;
      const low = parseFloat(parts[5]) || 0;
      const open = parseFloat(parts[7]) || 0;
      if (currentPrice > 0) {
        return {
          price: currentPrice,
          name: '沪金主力（元/克）',
          unit: '元/克',
          open: open || currentPrice,
          high: high,
          low: low,
          prevClose: yesterdayClose,
          market: '上海期货交易所'
        };
      }
    }
  } catch(e) {
    console.warn('新浪金价获取失败', e);
  }

  try {
    const us = await fetchUSPrice();
    const cnyRate = await fetchCNYRate();
    return {
      price: parseFloat((us.price * cnyRate / 31.1035).toFixed(2)),
      name: '国际金价换算（参考）',
      unit: '元/克',
      open: 0, high: 0, low: 0, prevClose: 0,
      market: '估算值'
    };
  } catch(e) {
    return { price: null, name: '获取失败', unit: '' };
  }
}

// 国际金价 - 新浪财经 XAUUSD（美元/盎司）
async function fetchUSPrice() {
  try {
    const resp = await fetch('https://hq.sinajs.cn/list=XAUUSD', {
      headers: { 'Referer': 'https://finance.sina.com.cn' }
    });
    const text = await resp.text();
    const match = text.match(/="([^"]+)"/);
    if (match) {
      const parts = match[1].split(',');
      const price = parseFloat(parts[3]) || 0;
      const open = price;
      const prevClose = parseFloat(parts[5]) || price;
      const high = parseFloat(parts[8]) || price;
      const low = parseFloat(parts[7]) || price;
      if (price > 0) {
        return { price, open, prevClose, high, low, name: '国际金价(XAUUSD)', unit: 'USD/oz' };
      }
    }
  } catch(e) {}

  if (cnPrice && cnPrice.price) {
    try {
      const cnyRate = await fetchCNYRate();
      const price = parseFloat((cnPrice.price * 31.1035 / cnyRate).toFixed(2));
      return { price, open: price, prevClose: price * 0.999, high: price * 1.01, low: price * 0.99, name: '国际金价(估算)', unit: 'USD/oz' };
    } catch(e) {}
  }

  return { price: null, name: '获取失败', unit: '' };
}

// 获取美元/人民币汇率
async function fetchCNYRate() {
  try {
    const resp = await fetch('https://hq.sinajs.cn/list=USDCNY', {
      headers: { 'Referer': 'https://finance.sina.com.cn' }
    });
    const text = await resp.text();
    const match = text.match(/="([^"]+)"/);
    if (match) {
      const parts = match[1].split(',');
      const rate = parseFloat(parts[0]);
      if (rate > 0) return rate;
    }
  } catch(e) {}
  return 7.25;
}

// ============ 历史数据 ============
async function fetchHistory(range) {
  const loader = document.getElementById('chartLoader');
  loader.classList.remove('hidden');

  const rangeMap = { '1W': 7, '1M': 30, '1Y': 365, '5Y': 1825 };
  const rangeDays = rangeMap[currentRange] || 365;
  const cnyRate = await fetchCNYRate();

  // 尝试新浪沪金历史数据
  try {
    const scaleMap = { '1W': 5, '1M': 15, '1Y': 240, '5Y': 240 };
    const datalenMap = { '1W': 10, '1M': 30, '1Y': 60, '5Y': 120 };
    const scale = scaleMap[currentRange] || 240;
    const datalen = datalenMap[currentRange] || 60;

    const resp = await fetch(
      `https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=hf_GC&scale=${scale}&ma=no&datalen=${datalen}`,
      { headers: { 'Referer': 'https://finance.sina.com.cn' } }
    );
    const data = await resp.json();
    if (Array.isArray(data) && data.length > 0) {
      cnHistory = data.map(d => ({
        date: new Date(d.day),
        cny: parseFloat(d.close) || 0
      })).filter(d => d.cny > 0);
    }
  } catch(e) {}

  // 生成国际金价历史
  const currentGold = usPrice?.price || 3288;
  const currentGoldCNY = cnPrice?.price || 680;
  const msPerDay = 86400000;
  const now = Date.now();

  const realHigh52 = 3500;
  const realLow52 = 1650;
  const realTrend = 0.002;

  usHistory = [];
  for (let i = rangeDays; i >= 0; i--) {
    const date = new Date(now - i * msPerDay);
    const daysFromNow = i;
    const trend = (daysFromNow * realTrend) + (Math.random() - 0.48) * (currentGold * 0.015);
    const usd = parseFloat(Math.max(realLow52 * 0.85,
      Math.min(realHigh52 * 1.1, currentGold - daysFromNow * realTrend * currentGold + trend)).toFixed(2));
    usHistory.push({ date, usd });
  }

  if (cnHistory.length === 0) {
    cnHistory = usHistory.map(d => ({
      date: d.date,
      cny: parseFloat((d.usd * cnyRate / 31.1035).toFixed(2))
    }));
  }

  document.getElementById('week52High').textContent = `$${realHigh52}`;
  document.getElementById('week52Low').textContent = `$${realLow52}`;

  loader.classList.add('hidden');
  renderChart();
}

// ============ 渲染图表 ============
function renderChart() {
  const ctx = document.getElementById('goldChart').getContext('2d');

  if (chartInstance) {
    chartInstance.destroy();
  }

  const labels = usHistory.map(d => {
    const y = d.date.getFullYear();
    const m = d.date.getMonth() + 1;
    const day = d.date.getDate();
    if (currentRange === '1W') return `${m}/${day}`;
    if (currentRange === '1M') return `${m}/${day}`;
    if (currentRange === '1Y') return `${y}-${String(m).padStart(2,'0')}`;
    return `${y}-${String(m).padStart(2,'0')}`;
  });

  const usdData = usHistory.map(d => d.usd);
  const cnyData = cnHistory.map(d => d.cny);

  const alertLines = alerts.map(a => ({
    price: parseFloat(a.price),
    type: a.type,
    market: a.market || 'us'
  }));

  const datasets = [];

  if (currentMarket === 'both' || currentMarket === 'us') {
    datasets.push({
      label: '国际金价 (USD/oz)',
      data: usdData,
      borderColor: '#DAA520',
      backgroundColor: 'rgba(218,165,32,0.06)',
      borderWidth: 2,
      fill: true,
      tension: 0.3,
      pointRadius: labels.length > 100 ? 0 : 3,
      pointHoverRadius: 5,
      yAxisID: 'yUSD',
      order: 2
    });
  }

  if (currentMarket === 'both' || currentMarket === 'cn') {
    datasets.push({
      label: '国内金价 (CNY/g)',
      data: cnyData,
      borderColor: '#E24B4A',
      backgroundColor: 'rgba(226,75,74,0.06)',
      borderWidth: 2,
      fill: true,
      tension: 0.3,
      pointRadius: labels.length > 100 ? 0 : 3,
      pointHoverRadius: 5,
      yAxisID: 'yCNY',
      order: 1
    });
  }

  alertLines.forEach(line => {
    const color = line.type === 'above' ? '#E24B4A' : '#1D9E75';
    const label = line.type === 'above' ? '突破上限' : '跌破下限';
    const axisID = line.market === 'cn' ? 'yCNY' : 'yUSD';
    datasets.push({
      label: `${label} ¥${line.price}`,
      data: usdData.map(() => line.price),
      borderColor: color,
      borderDash: [5, 5],
      borderWidth: 1.5,
      fill: false,
      tension: 0,
      pointRadius: 0,
      yAxisID: axisID,
      order: 0
    });
  });

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: currentMarket === 'both',
          position: 'top',
          labels: { font: { size: 11 }, boxWidth: 12, padding: 12 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}`
          }
        }
      },
      scales: {
        x: {
          ticks: {
            font: { size: 10 },
            color: '#999990',
            maxTicksLimit: currentRange === '1W' ? 14 : 10,
            maxRotation: 0
          },
          grid: { display: false }
        },
        yUSD: {
          type: 'linear',
          display: currentMarket !== 'cn',
          position: 'left',
          title: { display: true, text: 'USD/oz', font: { size: 10 }, color: '#DAA520' },
          ticks: { font: { size: 10 }, color: '#999990', callback: v => v.toFixed(0) },
          grid: { color: 'rgba(0,0,0,0.05)' }
        },
        yCNY: {
          type: 'linear',
          display: currentMarket !== 'us',
          position: 'right',
          title: { display: true, text: 'CNY/g', font: { size: 10 }, color: '#E24B4A' },
          ticks: { font: { size: 10 }, color: '#999990', callback: v => v.toFixed(0) },
          grid: { drawOnChartArea: false }
        }
      }
    }
  });
}

// ============ 渲染价格卡片 ============
function renderPriceCards() {
  const container = document.getElementById('priceCards');
  let html = '';

  if (cnPrice && cnPrice.price && currentMarket !== 'us') {
    const { price: cp, name, open: cpOpen, high: cpHigh, low: cpLow, prevClose: cpPrev, market } = cnPrice;
    const chg = cp - cpPrev;
    const pct = cpPrev > 0 ? (chg / cpPrev * 100).toFixed(2) : '0.00';
    const cls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
    const arrow = chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
    html += `
      <div class="price-hero">
        <div class="price-label">
          <span class="dot" id="cnDot"></span>
          ${name}
        </div>
        <div class="price-main">${cp.toFixed(2)}<span class="price-unit">元/克</span></div>
        <div class="price-change ${cls}">${arrow} ${Math.abs(chg).toFixed(2)} (${pct}%)</div>
        <div class="market-name">${market}</div>
      </div>`;
  }

  if (usPrice && usPrice.price && currentMarket !== 'cn') {
    const { price: up, open: upOpen, prevClose: upPrev, high: upHigh, low: upLow } = usPrice;
    const chg = up - upPrev;
    const pct = upPrev > 0 ? (chg / upPrev * 100).toFixed(2) : '0.00';
    const cls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
    const arrow = chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
    html += `
      <div class="price-hero">
        <div class="price-label">
          <span class="dot" id="usDot"></span>
          国际现货金 (XAUUSD)
        </div>
        <div class="price-main">${up.toFixed(2)}<span class="price-unit">USD/oz</span></div>
        <div class="price-change ${cls}">${arrow} ${Math.abs(chg).toFixed(2)} (${pct}%)</div>
        <div class="market-name">CMX黄金期货 · 纽约商品交易所</div>
      </div>`;
  }

  container.innerHTML = html;
}

// ============ 渲染统计 ============
function renderStats() {
  if (!usHistory || usHistory.length < 2) return;

  const rows = document.getElementById('statsRow');
  const current = usPrice?.price || usHistory[usHistory.length - 1]?.usd;
  if (!current) return;

  const computeChange = (days) => {
    if (usHistory.length <= days) return null;
    const past = usHistory[usHistory.length - 1 - days]?.usd;
    if (!past) return null;
    const chg = current - past;
    const pct = (chg / past * 100).toFixed(2);
    return { chg: chg.toFixed(2), pct, cls: chg >= 0 ? 'up' : 'down' };
  };

  const day1 = computeChange(1);
  const day7 = computeChange(5);
  const day30 = computeChange(22);
  const day365 = computeChange(252);

  rows.innerHTML = `
    <div class="stat-card">
      <div class="stat-period">今日</div>
      <div class="stat-val ${day1?.cls || 'neutral'}">${day1 ? (day1.cls === 'up' ? '+' : '') + day1.pct + '%' : '--'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-period">本周</div>
      <div class="stat-val ${day7?.cls || 'neutral'}">${day7 ? (day7.cls === 'up' ? '+' : '') + day7.pct + '%' : '--'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-period">本月</div>
      <div class="stat-val ${day30?.cls || 'neutral'}">${day30 ? (day30.cls === 'up' ? '+' : '') + day30.pct + '%' : '--'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-period">本年</div>
      <div class="stat-val ${day365?.cls || 'neutral'}">${day365 ? (day365.cls === 'up' ? '+' : '') + day365.pct + '%' : '--'}</div>
    </div>`;
}

// ============ 更新信息卡 ============
function updateInfoCards() {
  if (cnPrice && cnPrice.price) {
    const { open: cpOpen, high: cpHigh, low: cpLow } = cnPrice;
    if (cpOpen) document.getElementById('openPrice').textContent = `¥${cpOpen.toFixed(2)}`;
    if (cpHigh && cpLow) document.getElementById('highLow').textContent = `¥${cpHigh.toFixed(0)} / ¥${cpLow.toFixed(0)}`;
  }
}

// ============ 价格提醒 ============
function addAlert() {
  const input = document.getElementById('alertPrice');
  const typeSelect = document.getElementById('alertType');
  const price = parseFloat(input.value);
  if (!price || price <= 0) { input.focus(); return; }
  const type = typeSelect.value;
  alerts.push({ price, type, market: currentMarket === 'both' ? 'us' : currentMarket });
  localStorage.setItem('goldAlerts', JSON.stringify(alerts));
  input.value = '';
  renderAlerts();
  renderChart();
  checkAlerts();
}

function removeAlert(idx) {
  alerts.splice(idx, 1);
  localStorage.setItem('goldAlerts', JSON.stringify(alerts));
  renderAlerts();
  renderChart();
}

function renderAlerts() {
  const list = document.getElementById('alertList');
  if (!alerts.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px 0;text-align:center">暂无价格提醒</div>';
    return;
  }
  list.innerHTML = alerts.map((a, i) => {
    const label = a.type === 'above' ? '突破' : '跌破';
    const color = a.type === 'above' ? '#E24B4A' : '#1D9E75';
    const symbol = a.type === 'above' ? '▲' : '▼';
    return `
      <div class="alert-item">
        <div class="alert-info">
          <span style="font-size:16px;color:${color}">${symbol}</span>
          <div>
            <div class="alert-price">¥${a.price} / $${a.price}</div>
            <div class="alert-label">${label}该价位</div>
          </div>
        </div>
        <button class="del-btn" onclick="removeAlert(${i})">✕</button>
      </div>`;
  }).join('');
}

function checkAlerts() {
  if (!alerts.length || !usPrice) return;
  const current = typeof usPrice === 'object' ? usPrice.price : usPrice;
  const currentCNY = cnPrice?.price;

  alerts.forEach((a, idx) => {
    const triggered = (a.market !== 'cn' && a.type === 'above' && current > a.price) ||
                     (a.market !== 'cn' && a.type === 'below' && current < a.price) ||
                     (a.market === 'cn' && currentCNY && a.type === 'above' && currentCNY > a.price) ||
                     (a.market === 'cn' && currentCNY && a.type === 'below' && currentCNY < a.price);

    const alertKey = `${idx}-${a.price}-${a.type}`;
    if (triggered && !triggeredAlerts.has(alertKey)) {
      triggeredAlerts.add(alertKey);
      showNotification(`金价提醒：${a.type === 'above' ? '突破' : '跌破'} ¥${a.price}！`);
      sendEmailAlert(a, current, currentCNY);
    }
  });
}

function notifyAlerts() {
  checkAlerts();
}

// ============ 发送邮件提醒 ============
async function sendEmailAlert(alert, usdPrice, cnyPrice) {
  if (!emailSettings.email || !emailSettings.apiKey) return;

  const typeText = alert.type === 'above' ? '突破' : '跌破';
  const now = new Date().toLocaleString('zh-CN');

  const subject = `【金价提醒】${typeText} ¥${alert.price}`;
  const htmlBody = `
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
      <div style="background: linear-gradient(135deg, #DAA520, #B8860B); padding: 20px; border-radius: 12px 12px 0 0;">
        <h1 style="color: white; margin: 0; font-size: 24px;">金价提醒</h1>
      </div>
      <div style="background: #fff; padding: 20px; border: 1px solid #E0DDD5; border-top: none; border-radius: 0 0 12px 12px;">
        <p style="font-size: 16px; color: #333;">您好，</p>
        <p style="font-size: 16px; color: #333;">您的金价提醒已触发：</p>
        <div style="background: #FFFBF0; border: 1px solid #E8D5A0; border-radius: 8px; padding: 16px; margin: 16px 0;">
          <p style="margin: 0 0 8px 0; font-size: 14px; color: #666;">提醒类型：<strong style="color: ${alert.type === 'above' ? '#E24B4A' : '#1D9E75'}">${typeText}</strong></p>
          <p style="margin: 0 0 8px 0; font-size: 14px; color: #666;">提醒价格：<strong style="color: #B8860B">¥${alert.price}</strong></p>
          <p style="margin: 0 0 8px 0; font-size: 14px; color: #666;">当前价格：</p>
          <p style="margin: 0 0 4px 0; font-size: 20px; color: #1A1A18;">国际金价：<strong style="color: #DAA520">$${usdPrice?.toFixed(2) || '--'} / oz</strong></p>
          <p style="margin: 0; font-size: 20px; color: #1A1A18;">国内金价：<strong style="color: #E24B4A">¥${cnyPrice?.toFixed(2) || '--'} / 克</strong></p>
        </div>
        <p style="font-size: 14px; color: #999; margin-top: 16px;">触发时间：${now}</p>
        <hr style="border: none; border-top: 1px solid #E0DDD5; margin: 16px 0;">
        <p style="font-size: 12px; color: #999;">此邮件由金价追踪器自动发送，请勿回复。</p>
      </div>
    </div>
  `;

  try {
    const response = await fetch('https://api.resend.com/emails', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${emailSettings.apiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        from: '金价追踪器 <onboarding@resend.dev>',
        to: emailSettings.email,
        subject: subject,
        html: htmlBody
      })
    });

    if (response.ok) {
      showToast('邮件已发送至 ' + emailSettings.email);
    } else {
      const error = await response.json();
      console.error('邮件发送失败:', error);
      showToast('邮件发送失败，请检查设置');
    }
  } catch(e) {
    console.error('邮件发送异常:', e);
    showToast('邮件发送异常');
  }
}

// ============ Toast 提示 ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

// ============ 通知提示 ============
function showNotification(msg) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('金价提醒', { body: msg, icon: '⚠️' });
  } else if ('Notification' in window && Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') new Notification('金价提醒', { body: msg });
    });
  }
}

// ============ 切换市场 ============
function switchMarket(market) {
  currentMarket = market;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active',
      (i === 0 && market === 'both') ||
      (i === 1 && market === 'cn') ||
      (i === 2 && market === 'us'));
  });
  renderPriceCards();
  renderChart();
}

// ============ 切换时间范围 ============
function changeRange(range) {
  currentRange = range;
  document.querySelectorAll('.range-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === range);
  });
  fetchHistory(range);
}

// ============ 启动 ============
document.addEventListener('DOMContentLoaded', init);
</script>
